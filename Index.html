<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills test</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: url("https://static.vecteezy.com/system/resources/thumbnails/011/005/174/small/creative-education-background-with-school-supplies-vector.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }

        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background-color: #e9ecef;
            padding: 40px;
            border-radius: 25px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="login-container">
        <form class="login-card">

            <h1>Login</h1>

            <div>
                <span class="label-pill">Username</span>
                <input type="text" id="username" class="form-control" placeholder="Enter here">
            </div>

            <div>
                <span class="label-pill">Password</span>
                <input type="password" id="password" class="form-control" placeholder="********">
            </div>

            <div class="d-flex align-items-center justify-content-start mb-3">
                <input type="checkbox" class="form-check-input me-2" checked>
                <div>
                    <div>Stay logged in</div>
                    <div class="small-text">Your session will stay active on this device.</div>
                </div>
            </div>

            <div class="d-flex justify-content-center gap-3">
                <button type="button" class="btn btn-login" onclick="checkLogin()">Login</button>
                <button type="button" class="btn btn-light">Cancel</button>
            </div>

            <p id="login-message" class="mt-3 fw-bold"></p>

        </form>
    </div>

    <script>
        const validUsername = "Tom Smith";
        const validPassword = "12345678";

        function checkLogin() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let message = document.getElementById("login-message");

            if (username === validUsername && password === validPassword) {
                message.textContent = "Access Granted";
            } else {
                message.textContent = "Access Denied";
            }
        }
    </script>

</body>
</html>
